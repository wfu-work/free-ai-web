<section class="model-page">
  <div class="d-flex justify-content-between header-row">
    <title-label
      title="模型映射"
      description="配置 publicModel 到上游模型、供应商、账号组和请求超时的路由关系。"
    />
    <div class="header-actions">
      <button nz-button (click)="q.page = 1; getData()">
        <i nz-icon nzType="reload"></i>
        刷新
      </button>
      <button nz-button nzType="primary" (click)="add()">
        <i nz-icon nzType="plus"></i>
        新增映射
      </button>
    </div>
  </div>

  <nz-alert
    nzType="info"
    nzShowIcon
    nzMessage="publicModel 是业务客户端请求中的 model；aliases 可作为同一映射的额外入口。"
  />

  <nz-card class="model-card" [nzBordered]="false">
    <div class="d-flex justify-content-between mb-md">
      <h2>{{ '模型映射' }}</h2>
      <div class=" d-flex text-right">
        <nz-select
          [(ngModel)]="q.enabled"
          placeholder="启用状态"
          (ngModelChange)="q.page = 1; getData()"
        >
          <nz-option [nzValue]="''" [nzLabel]="'全部'" />
          <nz-option [nzValue]="1" [nzLabel]="'启用'" />
          <nz-option [nzValue]="0" [nzLabel]="'禁用'" />
        </nz-select>
        <nz-input-wrapper class="ml-lg">
          <nz-icon nzInputPrefix nzType="search" />
          <input
            nz-input
            [(ngModel)]="q.content"
            name="content"
            [placeholder]="'请输入搜索内容'"
            (keydown.enter)="q.page = 1; getData()"
          />
        </nz-input-wrapper>
        <div class="d-flex ml-lg">
          <button nz-button (click)="q.page = 1; getData()" nzType="primary">
            {{ '搜索' }}
          </button>
          <button nz-button (click)="q.page = 1; q.content = ''; getData()">
            {{ '重置' }}
          </button>
        </div>
      </div>
    </div>

    <st
      [data]="data"
      [columns]="columns"
      [loading]="loading"
      [pi]="q.page"
      [ps]="q.size"
      [total]="totalCount"
      (change)="tableChange($event)"
    >
      <ng-template st-row="publicRender" let-item>
        <div class="model-name">{{ item.publicModel || '-' }}</div>
        <button
          type="button"
          class="copy-text"
          nz-tooltip
          nzTooltipTitle="复制 publicModel"
          (click)="copy(item.publicModel, 'publicModel')"
        >
          {{ formatAliases(item.aliases) }}
        </button>
      </ng-template>

      <ng-template st-row="upstreamRender" let-item>
        <div>{{ item.upstreamModel || '-' }}</div>
        <span class="muted">{{ item.guid }}</span>
      </ng-template>

      <ng-template st-row="providerRender" let-item>
        <div class="provider-line">{{ item.provider || '全局供应商' }}</div>
        <span class="muted">{{ item.accountGroup || '全局账号组' }}</span>
      </ng-template>

      <ng-template st-row="timeoutRender" let-item> {{ item.timeoutSec || 120 }}s </ng-template>
    </st>
  </nz-card>
</section>
