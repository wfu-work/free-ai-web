<section class="key-page">
  <div class="d-flex justify-content-between header-row">
    <title-label
      title="平台密钥"
      description="管理业务客户端访问 /v1 代理入口使用的本地平台密钥。"
    />
    <div class="header-actions">
      <button nz-button (click)="q.page = 1; getData()">
        <i nz-icon nzType="reload"></i>
        刷新
      </button>
      <button nz-button nzType="primary" (click)="add()">
        <i nz-icon nzType="plus"></i>
        创建密钥
      </button>
    </div>
  </div>

  <nz-alert
    nzType="warning"
    nzShowIcon
    nzMessage="密钥明文只在创建成功后展示一次，请立即复制到业务客户端配置中。"
  />

  <nz-card class="key-card" [nzBordered]="false">
    <div class="d-flex justify-content-between mb-md">
      <h2>{{ '平台密钥' }}</h2>
      <div class=" d-flex text-right">
        <nz-select
          [(ngModel)]="q.enabled"
          placeholder="启用状态"
          (ngModelChange)="q.page = 1; getData()"
        >
          <nz-option [nzValue]="''" [nzLabel]="'全部'" />
          <nz-option [nzValue]="1" [nzLabel]="'启用'" />
          <nz-option [nzValue]="0" [nzLabel]="'禁用'" />
        </nz-select>
        <nz-input-wrapper class="ml-lg">
          <nz-icon nzInputPrefix nzType="search" />
          <input
            nz-input
            [(ngModel)]="q.content"
            name="content"
            [placeholder]="'请输入搜索内容'"
            (keydown.enter)="q.page = 1; getData()"
          />
        </nz-input-wrapper>
        <div class="d-flex ml-lg">
          <button nz-button (click)="q.page = 1; getData()" nzType="primary">
            {{ '搜索' }}
          </button>
          <button nz-button (click)="q.page = 1; q.content = ''; q.enabled = ''; getData()">
            {{ '重置' }}
          </button>
        </div>
      </div>
    </div>

    <st
      [data]="data"
      [columns]="columns"
      [loading]="loading"
      [pi]="q.page"
      [ps]="q.size"
      [total]="totalCount"
      (change)="tableChange($event)"
    >
      <ng-template st-row="nameRender" let-item>
        <div class="key-name">{{ item.name || '-' }}</div>
        <button
          type="button"
          class="copy-text"
          nz-tooltip
          nzTooltipTitle="复制 keyPrefix"
          (click)="copy(item.keyPrefix, 'keyPrefix')"
        >
          {{ item.keyPrefix || '-' }}
        </button>
      </ng-template>

      <ng-template st-row="modelsRender" let-item>
        <span class="models-text">{{ formatModels(item.allowedModels) }}</span>
      </ng-template>

      <ng-template st-row="limitRender" let-item>
        {{ formatLimit(item.rateLimitPerMinute) }}
      </ng-template>

      <ng-template st-row="lastUsedRender" let-item>
        {{ formatTime(item.lastUsedAt) }}
      </ng-template>

      <ng-template st-row="remarkRender" let-item>
        <span class="muted">{{ item.remark || '-' }}</span>
      </ng-template>

    </st>
  </nz-card>
</section>

<nz-modal
  nzTitle="平台密钥已创建"
  [nzVisible]="secretVisible"
  nzOkText="我已保存"
  [nzCancelText]="null"
  (nzOnOk)="closeSecret()"
  (nzOnCancel)="closeSecret()"
>
  <ng-container *nzModalContent>
    @if (secretView) {
      <div class="secret-panel">
        <nz-alert
          nzType="warning"
          nzShowIcon
          nzMessage="请立即保存完整密钥。关闭弹窗后无法再次查看，只能重新创建。"
        />
        <div class="secret-row">
          <span>Authorization</span>
          <code>Bearer {{ secretView.key }}</code>
          <button nz-button nzSize="small" (click)="copy('Bearer ' + secretView.key, 'Authorization')">
            复制
          </button>
        </div>
        <div class="secret-row">
          <span>keyPrefix</span>
          <code>{{ secretView.entity.keyPrefix }}</code>
          <button nz-button nzSize="small" (click)="copy(secretView.entity.keyPrefix, 'keyPrefix')">
            复制
          </button>
        </div>
      </div>
    }
  </ng-container>
</nz-modal>
