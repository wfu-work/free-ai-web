<form nz-form [formGroup]="form" (ngSubmit)="submit()" role="form">
  <nz-alert
    nzType="info"
    nzShowIcon
    nzMessage="优先使用后端真实登录接口进入控制台；如果本地后端未提供登录能力，前端会回退到本地会话模式。"
    class="mb-lg"
  />
  <nz-tabs [nzAnimated]="false" class="tabs" (nzSelectChange)="switch($event)">
    <nz-tab [nzTitle]="'管理员账号'">
      @if (error) {
        <nz-alert [nzType]="'error'" [nzMessage]="error" [nzShowIcon]="true" class="mb-lg" />
      }
      <nz-form-item>
        <nz-form-control nzErrorTip="请输入管理员用户名">
          <nz-input-wrapper>
            <nz-icon nzInputPrefix nzType="user" />
            <input
              nz-input
              nzSize="large"
              formControlName="username"
              autocomplete="username"
              placeholder="管理员用户名"
            />
          </nz-input-wrapper>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control nzErrorTip="请输入登录密码">
          <app-password-input formControlName="password" />
        </nz-form-control>
      </nz-form-item>
    </nz-tab>
    <nz-tab [nzTitle]="'快速进入'">
      <nz-form-item>
        <nz-form-control [nzErrorTip]="emailErrorTip">
          <nz-input-wrapper>
            <nz-icon nzInputPrefix nzType="mail" />
            <input
              nz-input
              nzSize="large"
              formControlName="email"
              autocomplete="email"
              placeholder="可填写邮箱或备注名"
            />
          </nz-input-wrapper>
          <ng-template #emailErrorTip let-i>
            @if (i.errors.required) {
              请输入管理员邮箱！
            }
            @if (i.errors.email) {
              邮箱格式不正确！
            }
          </ng-template>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control [nzErrorTip]="'请输入邮箱验证码！'">
          <nz-row [nzGutter]="8">
            <nz-col [nzSpan]="16">
              <nz-input-wrapper>
                <nz-icon nzInputPrefix nzType="mail" />
                <input nz-input nzSize="large" formControlName="captcha" placeholder="任意占位文本" />
              </nz-input-wrapper>
            </nz-col>
            <nz-col [nzSpan]="8">
              <button
                type="button"
                nz-button
                nzSize="large"
                (click)="getCaptcha()"
                [disabled]="count > 0"
                nzBlock
                [nzLoading]="loading"
              >
                {{ count ? count + 's' : '填充演示码' }}
              </button>
            </nz-col>
          </nz-row>
        </nz-form-control>
      </nz-form-item>
    </nz-tab>
  </nz-tabs>
  <nz-form-item>
    <nz-col [nzSpan]="12">
      <label nz-checkbox formControlName="remember">保持登录状态</label>
    </nz-col>
    <nz-col [nzSpan]="12" class="text-right">
      <span class="forgot">真实登录优先</span>
    </nz-col>
  </nz-form-item>
  <nz-form-item>
    <button nz-button type="submit" nzType="primary" nzSize="large" [nzLoading]="loading" nzBlock>
      进入控制台
    </button>
  </nz-form-item>
</form>
